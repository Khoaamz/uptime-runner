# Target 2 — opaque name. Per-tracker persona probe.
#
# Required repo secrets:
#   - TARGET_2_LIST_URL     read-only tracker list endpoint
#   - TARGET_2_REPORT_URL   per-tracker per-persona ingest endpoint
#   - TARGET_2_TOKEN        bearer for X-Internal-Auth header

name: target-2
on:
  schedule:
    - cron: '*/30 * * * *'   # every 30min — sample-based, less aggressive than target-1
  workflow_dispatch: {}

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - name: Probe per-tracker personas
        env:
          TOKEN: ${{ secrets.TARGET_2_TOKEN }}
          LIST_URL: ${{ secrets.TARGET_2_LIST_URL }}
          REPORT_URL: ${{ secrets.TARGET_2_REPORT_URL }}
        run: |
          set -uo pipefail

          # Validate env presence (URL/TOKEN length only — never echo values).
          if [ -z "${LIST_URL:-}" ]; then echo "stage=preflight code=missing_list_url"; exit 10; fi
          if [ -z "${REPORT_URL:-}" ]; then echo "stage=preflight code=missing_report_url"; exit 11; fi
          if [ -z "${TOKEN:-}" ]; then echo "stage=preflight code=missing_token"; exit 12; fi
          # Audit §8 fix (2026-06-27): keep success log minimal — env lengths
          # were not a direct secret leak but public logs don't need them.
          echo "preflight ok"

          # Silent run — public-repo workflow logs must not leak tracker
          # IDs, cloak URLs, money URLs, or partner names. Counts only.
          set +e
          LIST=$(curl -fsS -H "X-Internal-Auth: $TOKEN" "$LIST_URL"); CURL_RC=$?
          set -e
          if [ "$CURL_RC" -ne 0 ]; then
            echo "stage=list code=curl_exit_${CURL_RC}"
            exit 1
          fi
          TRACKER_COUNT=$(echo "$LIST" | jq '.trackers | length' 2>/dev/null || echo "ERR")
          if [ "$TRACKER_COUNT" = "ERR" ]; then
            echo "stage=list code=jq_parse_failed body_len=${#LIST}"
            exit 1
          fi
          if [ "$TRACKER_COUNT" = "0" ]; then
            echo "no_trackers"
            exit 0
          fi
          echo "probing ${TRACKER_COUNT} tracker(s) × 4 personas"

          UA_HUMAN='Mozilla/5.0 (iPhone; CPU iPhone OS 17_6 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) CriOS/126 Mobile/15E148 Safari/604.1'
          UA_BOT='Mozilla/5.0 (compatible; HeadlessChrome/124.0.0.0) AppleWebKit/537.36'
          UA_FB_CRAWLER='facebookexternalhit/1.1 (+http://www.facebook.com/externalhit_uatext.php)'
          UA_FB_AD_REVIEW='Mozilla/5.0 (compatible; meta-externalagent/1.1; +https://developers.facebook.com/docs/sharing/webmasters/crawler)'

          REPORTS='[]'
          while read -r row; do
            TID=$(echo "$row" | jq -r '.tracker_id')
            CLOAK=$(echo "$row" | jq -r '.cloak_url')
            now=$(date +%s)

            for persona in human bot fb_crawler fb_ad_review; do
              case "$persona" in
                human) ua="$UA_HUMAN" ;;
                bot) ua="$UA_BOT" ;;
                fb_crawler) ua="$UA_FB_CRAWLER" ;;
                fb_ad_review) ua="$UA_FB_AD_REVIEW" ;;
              esac
              hdrs=$(curl -sI --max-time 8 --connect-timeout 4 -A "$ua" "$CLOAK" 2>/dev/null || true)
              status=$(echo "$hdrs" | awk 'NR==1{print $2}')
              location=$(echo "$hdrs" | awk 'tolower($1)=="location:"{print $2; exit}' | tr -d '\r')
              err_field="null"
              REPORTS=$(echo "$REPORTS" | jq \
                --argjson tid "$TID" \
                --arg p "$persona" \
                --argjson s "${status:-0}" \
                --arg l "${location:-}" \
                --argjson e "$err_field" \
                --argjson t "$now" \
                '. + [{trackerId: $tid, persona: $p, status: $s, location: $l, error: $e, checkedAt: $t}]')
            done
          done < <(echo "$LIST" | jq -c '.trackers[]')

          # Don't echo REPORTS — it contains cloak URLs + Location values.
          set +e
          HTTP_CODE=$(curl -sS -o /dev/null -w '%{http_code}' -X POST \
            -H "X-Internal-Auth: $TOKEN" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --argjson r "$REPORTS" '{reports: $r}')" \
            "$REPORT_URL"); CURL_RC=$?
          set -e
          if [ "$CURL_RC" -ne 0 ]; then
            echo "stage=report code=curl_exit_${CURL_RC}"
            exit 1
          fi
          echo "report_http=${HTTP_CODE}"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "stage=report code=non_200"
            exit 1
          fi
